<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKINSCAN ROUTINE</title>
    <style>
        @font-face {
            font-family: 'NixieOne';
            src: url('NixieOne.ttf') format('truetype');
        }
        body { margin: 0; background: #e9e9e9; font-family: 'NixieOne', serif; display: flex; justify-content: center; }
        .container { max-width: 420px; width: 100%; background: #f3f3f3; padding: 20px; box-sizing: border-box; }
        h1 { text-align: center; font-size: 32px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        
        .types { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; }
        .type-btn { border: 1px solid #bbb; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; background: white; transition: 0.3s; }
        .type-btn.active { background: #000; color: #fff; border-color: #000; }

        .section-title { font-size: 18px; margin: 25px 0 15px; display: flex; align-items: center; gap: 10px; }
        /* 해와 달 이미지 사이즈 */
        .section-title img { width: 30px; height: 30px; }
        
        .step { display: flex; align-items: center; margin-bottom: 15px; }
        
        .icon-circle { 
            width: 50px; height: 50px; 
            margin-right: 15px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; 
            border: 2px solid #ddd;
            background: #fff;
            overflow: hidden; 
            transition: 0.3s;
        }

        /* 이미지를 살짝 확대해서 빈틈없이 꽉 채우기 */
        .icon-circle img { 
            width: 110%; 
            height: 110%; 
            object-fit: cover; 
            object-position: center;
        }
        
        .icon-circle.active { border-color: #000; }

        .input-box { flex: 1; }
        .input-box input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; background: #fff; font-size: 14px; box-sizing: border-box; font-family: 'NixieOne'; }
    </style>
</head>
<body>

<div class="container">
    <h1>SKINSCAN ROUTINE</h1>

    <div class="types">
        <div class="type-btn" onclick="selectType(this)">Dry&Sensitive</div>
        <div class="type-btn" onclick="selectType(this)">Pore&Oily</div>
        <div class="type-btn" onclick="selectType(this)">Slow-aging</div>
    </div>

    <div class="section-title">▶ MORNING CARE ROUTIN <img src="해.png" alt="sun"></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="클렌징.png"></div><div class="input-box"><input placeholder="Cleansing"></div></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="세럼.png"></div><div class="input-box"><input placeholder="Skincare1"></div></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="크림.png"></div><div class="input-box"><input placeholder="Skincare2"></div></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="마스크.png"></div><div class="input-box"><input placeholder="Specialcare"></div></div>

    <div class="section-title">▶ NIGHT CARE ROUTIN <img src="달.png" alt="moon"></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="클렌징.png"></div><div class="input-box"><input placeholder="Cleansing"></div></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="세럼.png"></div><div class="input-box"><input placeholder="Skincare1"></div></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="크림.png"></div><div class="input-box"><input placeholder="Skincare2"></div></div>
    <div class="step"><div class="icon-circle routine-icon"><img src="마스크.png"></div><div class="input-box"><input placeholder="Specialcare"></div></div>
</div>

<script>
    function selectType(el) {
        document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.routine-icon').forEach(div => div.classList.add('active'));
    }
</script>
</body>
</html>
