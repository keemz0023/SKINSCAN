<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKINSCAN ROUTINE</title>

<style>
body {
  margin: 0;
  background: #e9e9e9;
  font-family: 'Georgia', serif;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #f3f3f3;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 32px;
  margin-bottom: 15px;
}

.types {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 20px;
}

.type-btn {
  border: 1px solid #bbb;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
}

.type-btn.active {
  background: #000;
  color: #fff;
}

.section-title {
  font-size: 18px;
  margin: 20px 0 10px;
  border-bottom: 1px solid #ccc;
  padding-bottom: 5px;
}

.step {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}

.circle {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  margin-right: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.blue { background: #a7d8de; }
.pink { background: #e8c3c3; }
.purple { background: #d6b4c4; }
.yellow { background: #e7e1a6; }

.input-box {
  flex: 1;
}

.input-box input {
  width: 100%;
  padding: 12px;
  border-radius: 15px;
  border: none;
  background: #cfcfcf;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>SKINSCAN ROUTINE</h1>

<div class="types">
  <div class="type-btn" onclick="selectType(this)">Dry&Sensitive</div>
  <div class="type-btn" onclick="selectType(this)">Pore&Oily</div>
  <div class="type-btn" onclick="selectType(this)">Slow-aging</div>
</div>

<div class="section-title">▶ MORNING CARE ROUTIN ☀️</div>

<div class="step">
  <div class="circle blue">🧼</div>
  <div class="input-box"><input placeholder="Cleansing"></div>
</div>

<div class="step">
  <div class="circle pink">💧</div>
  <div class="input-box"><input placeholder="Serum"></div>
</div>

<div class="step">
  <div class="circle purple">🧴</div>
  <div class="input-box"><input placeholder="Cream"></div>
</div>

<div class="step">
  <div class="circle yellow">🧖‍♀️</div>
  <div class="input-box"><input placeholder="Mask / Care"></div>
</div>

<div class="section-title">▶ NIGHT CARE ROUTIN 🌙</div>

<div class="step">
  <div class="circle blue">🧼</div>
  <div class="input-box"><input placeholder="Cleansing"></div>
</div>

<div class="step">
  <div class="circle pink">💧</div>
  <div class="input-box"><input placeholder="Serum"></div>
</div>

<div class="step">
  <div class="circle purple">🧴</div>
  <div class="input-box"><input placeholder="Cream"></div>
</div>

<div class="step">
  <div class="circle yellow">🧖‍♀️</div>
  <div class="input-box"><input placeholder="Mask / Care"></div>
</div>

</div>

<script>
function selectType(el) {
  document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
